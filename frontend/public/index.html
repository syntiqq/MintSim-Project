<!DOCTYPE html>
<html lang="ru">
<head>
  <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
  <meta charset="UTF-8" />
  <title>MintSim — NFT Minting</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- TonConnect SDK (если подключаешь в будущем) -->
  <script src="https://unpkg.com/@tonconnect/sdk/dist/tonconnect.min.js"></script>

  <style>
    /* ===== БАЗА И ФОН ===== */
    :root {
      --glass: rgba(15, 2, 20, 0.64);
      --border: rgba(255,255,255,.10);
      --text-dim: rgba(255,255,255,.75);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background: radial-gradient(circle at top, #1b1b2f, #0c0c14);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    a { color: inherit; text-decoration: none; }

    /* 🪐 Канвас с частицами */
    #particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 0;
      pointer-events: none;
    }
    header, main, footer {
      position: relative;
      z-index: 1;
    }

    /* ===== ВЕРХНЯЯ ПАНЕЛЬ ===== */
    header {
      position: sticky; top: 0; z-index: 20;
      display: flex; align-items: center; justify-content: space-between;
      gap: 70px;
      padding: 14px 18px;
      background: var(--glass);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .brand { font-weight: 800; letter-spacing: .4px; font-size: 18px; }
    .wallet-left { font-size: 13px; color: var(--text-dim); }
    .wallet-chip { display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 12px; background: rgba(255,255,255,.06); border: 1px solid var(--border); font-size: 13px; }
    .wallet-actions { display:flex; gap:10px; align-items:center; }

    .btn {
      appearance: none; border: 0; cursor: pointer;
      border-radius: 14px; padding: 12px 18px; font-weight: 700; color:#fff;
      font-size: 15px;
      background: linear-gradient(90deg, #6c5ce7, #8e7cff);
      box-shadow: 0 0 14px rgba(140,110,255,.35);
      transition: transform .15s ease, box-shadow .2s ease;
    }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 0 24px rgba(140,110,255,.6); }
    .btn-ghost { background: rgba(255,255,255,.10); box-shadow: none; border:1px solid var(--border); }
    .btn-ghost:hover { background: rgba(255,255,255,.16); }

    /* ===== КОНТЕНТНЫЕ СЕКЦИИ ===== */
    /* увеличил нижний отступ, чтобы полностью была видна карточка и место под таббар */
    main { padding: 18px 14px 140px; }
    .container { max-width: 560px; margin: 0 auto; }

    /* Mint карточка */
    .mint-card {
      position: relative;
      width: 130%;
      aspect-ratio: 1/1;
	    margin-left:-15%;
      border-radius: 22px;
      overflow: hidden;
      background: rgba(114, 26, 255, 0.89); /* фон */
      border: 2px solid var(--border);
      box-shadow: 0 16px 26px rgba(0,0,0,.38);
	    opacity: .85;
    }

    .mint-logo {
      position: absolute; top: 12px; right: 12px;
      width: 50px; height: 50px; object-fit: cover; opacity: .55;
	    border-radius: 50%;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,.45));
    }
    .mint-number {
      position: absolute; left: 50%; bottom: 18px; transform: translateX(-50%);
      font-weight: 800; letter-spacing: .06em; text-shadow: 0 2px 14px rgba(0,0,0,.45);
      font-size: 24px;
      line-height: 1;
      text-align: center;
      white-space: nowrap;
    }

    .minted-line { margin-top: 14px; text-align: center; color: var(--text-dim); font-size: 15px; }

    .card {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 10px 28px rgba(0,0,0,.35);
    }

    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }

    .tabbar {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 30;
      background: rgba(12,12,20,.94);
      border-top: 1px solid var(--border);
      padding: 12px 20px 16px;
      display: flex; align-items: flex-end; justify-content: space-between;
    }
    .tab {
      display: inline-flex; flex-direction: column; align-items: center; gap: 6px;
      color: var(--text-dim); font-size: 12px;
    }
    .tab.active { color: #fff; }
    .tab .icon { width: 50px; height: 50px; display: grid; place-items: center; }
    .tab-center {
      transform: translateY(-14px);
      display: grid; place-items: center; gap: 6px;
    }
    .tab-center {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transform: translateY(-12px);
    }
    .tab-center .dock {
      width: 20px;
      height: 2px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(140,110,255,0.35), rgba(255, 255, 255, 0.6));
      border: 1px solid var(--border);
      box-shadow: 0 8px 20px rgba(0,0,0,.45);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform .2s ease, box-shadow .2s ease;
    }
    .tab-center .dock:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 28px rgba(140,110,255,.5);
    }
    .logo-mini {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      object-fit: cover;
    }
    .tab-center span {
      font-size: 13px;
      color: white;
      text-align: center;
      margin-top: 4px;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <canvas id="particles"></canvas>

  <header>
    <div class="brand">MintSim</div>
    <div class="wallet-left" id="walletLeft">
      <span class="wallet-chip" id="walletChip" style="display:none">
        <span id="walletShort">—</span>
        <span id="walletBalance" class="mono" style="opacity:.8"></span>
      </span>
      <span id="walletNotConnected" style="opacity:.6">Wallet not connected</span>
    </div>
    <div class="wallet-actions">
      <button class="btn" id="connectBtn" onclick="connectWallet()">Connect</button>
      <button class="btn btn-ghost" id="disconnectBtn" onclick="disconnectWallet()" style="display:none">Disconnect</button>
    </div>
  </header>

  <main>
    <div class="container">
      <section id="page-mint">
        <div class="mint-card">
          <img src="/logo.png" class="mint-logo" />
          <div class="mint-number">+999 ** *** ***</div>
        </div>
        <div class="minted-line">
          <span id="mintedCount" data-minted="12345">12345</span> numbers already minted
        </div>
	      <div style="display: flex; justify-content: center; margin-top: 40px;">
    		  <button class="btn" onclick="mintNumber()">Mint Number</button>
 	      </div>
      </section>

      <section id="page-referral" class="hidden">
        <div class="card">
          <h3 style="margin:0 0 12px; font-weight:800;">Referral</h3>
          <div id="refLink" class="mono" style="word-break:break-all; font-size:14px; background:rgba(255,255,255,.06); border:1px solid var(--border); border-radius:12px; padding:12px;">
          </div>
          <div style="display:flex; gap:12px; margin-top:14px;">
            <button class="btn" style="flex:1" onclick="shareReferral()">Share</button>
            <button class="btn btn-ghost" style="flex:1" onclick="copyReferral()">Copy</button>
          </div>
        </div>
      </section>

      <section id="page-news" class="hidden">
        <div class="card" style="text-align:center">
          <h3 style="margin:0 0 8px; font-weight:800;">News</h3>
          <p style="margin:6px 0 14px; color:var(--text-dim)">Our Telegram chanel</p>
          <a id="tgLink" class="btn" target="_blank" rel="noreferrer">Open Telegram</a>
        </div>
      </section>

    </div>
  </main>

  <nav class="tabbar">
    <a href="#referral" class="tab" id="tab-referral" onclick="openTab('referral')">
      <span class="icon" aria-hidden="true">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.9 6.26L22 9.27l-5 4.87L18.18 22 12 18.77 5.82 22 7 14.14l-5-4.87 7.1-1.01L12 2z"/></svg>
      </span>
      <span>Referral</span>
    </a>

    <button class="tab tab-center" id="tab-mint" onclick="openTab('mint')" aria-label="Mint">
      <div class="dock">
        <img class="logo-mini" src="/logo.png" alt="Mint">
      </div>
      <span>Mint</span>
    </button>

    <a href="#news" class="tab" id="tab-news" onclick="openTab('news')">
      <span class="icon" aria-hidden="true">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
          <path d="M9.04 16.29l-.39 5.47c.56 0 .8-.24 1.09-.52l2.62-2.5 5.43 3.98c1 .55 1.71.26 1.98-.93l3.6-16.87.01-.01c.32-1.5-.54-2.08-1.51-1.72L1.5 9.85c-1.46.57-1.44 1.39-.25 1.76l5.68 1.77L19.2 6.2c.6-.36 1.15-.16.7.23"/>
        </svg>
      </span>
      <span>News</span>
    </a>
  </nav>

<script>
  // === Конфиг ===
  const BACKEND_URL =
  window.location.hostname === 'localhost'
    ? 'http://localhost:4000'
    : 'https://petaloid-mariella-enorm.ngrok-free.dev';
  const MANIFEST_URL = 'mint-sim-git-main-mintsims-projects-ae9861fe.vercel.app/tonconnect-manifest.json';

  // === TonConnect UI ===
  const tcUi = new TON_CONNECT_UI.TonConnectUI({
    manifestUrl: MANIFEST_URL,
    actionsConfiguration: {
      twaReturnUrl: window.Telegram?.WebApp?.initDataUnsafe ? 'https://t.me/' : undefined
    }
  });

  function getWalletAddress() {
    const acc = tcUi.account;
    return acc?.address || '';
  }

  tcUi.onStatusChange(() => {
    const addr = getWalletAddress();
    if (addr) updateWalletUI(addr, '');
    else updateWalletUI('', '');
  });

  // === Telegram auth (мягкая, если эндпоинта нет — пропускаем) ===
  let AUTH = { token: null, user: null };

  function getInitData() {
    const tg = window.Telegram?.WebApp;
    return tg?.initData || '';
  }

  function getTgId() {
    const tg = window.Telegram?.WebApp;
    if (tg?.initDataUnsafe?.user?.id) return String(tg.initDataUnsafe.user.id);
    let demo = localStorage.getItem('demo-tg-id');
    if (!demo) {
      demo = String(Math.floor(Math.random() * 1e12));
      localStorage.setItem('demo-tg-id', demo);
    }
    return demo;
  }

  async function authWithTelegram() {
  try {
    const initData = getInitData();
    const res = await fetch(`${BACKEND_URL}/api/auth/telegram`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ initData })
    });

    // если роут не существует — тихо выходим
    if (res.status === 404) {
      console.log('Auth endpoint not found — skipping Telegram auth (ok).');
      return;
    }

    const text = await res.text();
    let data; try { data = JSON.parse(text); } catch { data = null; }

    if (!res.ok) {
      const msg = (data && (data.error || data.detail)) || text || `HTTP ${res.status}`;
      throw new Error(msg);
    }

    AUTH.token = data?.token || null;
    AUTH.user  = data?.user  || null;
    console.log('✅ Auth OK', { token: AUTH.token ? 'present' : null, user: AUTH.user });
  } catch (e) {
    console.warn('Auth error (ignored):', e?.message || e);
  }
}

  // === Универсальный API-коллер к бэку ===
  async function api(path, opts = {}) {
    const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
    if (AUTH.token) headers['Authorization'] = `Bearer ${AUTH.token}`;
    const res = await fetch(`${BACKEND_URL}${path}`, { ...opts, headers });
    const text = await res.text();
    let data; try { data = JSON.parse(text); } catch { data = null; }
    if (!res.ok) {
      const msg = (data && (data.error || data.detail)) || text || `HTTP ${res.status}`;
      throw new Error(msg);
    }
    return data ?? {};
  }

  // === Кошелёк ===
  async function connectWallet() {
    try {
      await tcUi.openModal();
    } catch (e) {
      console.error('TonConnect connect error:', e);
      alert('Не удалось подключить кошелёк');
    }
  }

  async function disconnectWallet() {
    try {
      await tcUi.disconnect();
      updateWalletUI('', '');
    } catch (e) {
      console.error('TonConnect disconnect error:', e);
    }
  }

  // === Mint ===
  async function mintNumber() {
  try {
    const btn = document.querySelector('#page-mint button.btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Minting…'; }

    const wallet = tcUi.account;
    if (!wallet?.address) {
      alert('Подключи кошелёк');
      return;
    }

    const index = Date.now();

    const res = await fetch(`${BACKEND_URL}/api/mint`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-tg-id': getTgId()
      },
      body: JSON.stringify({
        walletAddress: wallet.address,
        priceTon: 5
      })
    });

    const data = await res.json();

    if (!res.ok) throw new Error(data?.detail || 'Mint failed');

    console.log('MINT OK:', data);

    alert(`✅ Minted #${data.number}`);

    document.querySelector('.mint-number').textContent = `#${data.number}`;

  } catch (e) {
    console.error(e);
    alert('❌ Mint failed: ' + e.message);
  }
}

  // === Реферал (опционально) ===
  async function loadReferralFromBackend() {
    try {
      const data = await api('/api/referral/me', { method: 'GET' });
      if (data?.link) {
        document.getElementById('refLink').textContent = data.link;
      }
    } catch {
      console.log('No referral from backend (ok). Using local builder.');
    }
  }

  // === Boot ===
  (async function boot() {
    try { window.Telegram?.WebApp?.ready(); window.Telegram?.WebApp?.expand(); } catch {}
    await authWithTelegram();
    await loadReferralFromBackend();
  })();

  // === Проверка связи с бэком (устойчивая) ===
  (async () => {
  try {
    const res = await fetch(`${BACKEND_URL}/api/ping`, { cache: 'no-store' });
    const ctype = res.headers.get('content-type') || '';
    const raw = await res.text();

    if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}: ${raw.slice(0,200)}`);
    if (!ctype.includes('application/json')) {
      console.warn('Пинг вернул не JSON (часто это страница ngrok об ошибке):', raw.slice(0,200));
      return;
    }

    const data = JSON.parse(raw);
    console.log('Проверка связи с бэком:', data);
  } catch (err) {
    console.error('Связь с бэком не работает:', err?.message || err);
  }
})();

  // === UI-хелперы/прочее ===
  const SITE_URL = 'https://app.mintsim.io';
  const TELEGRAM_CHANNEL = 'https://t.me/kurim_blant';
  document.getElementById('tgLink').href = TELEGRAM_CHANNEL;

  function setActiveTab(tab) {
    ['referral','mint','news'].forEach(id => {
      document.getElementById('tab-'+id).classList.toggle('active', id === tab);
    });
  }

  function openTab(tab) {
    document.getElementById('page-referral').classList.toggle('hidden', tab !== 'referral');
    document.getElementById('page-mint').classList.toggle('hidden', tab !== 'mint');
    document.getElementById('page-news').classList.toggle('hidden', tab !== 'news');
    setActiveTab(tab);
    if (tab === 'referral') buildReferralLink();
  }
  openTab('mint');

  function getCurrentWalletAddress() {
    return window.__WALLET_ADDR__ || '';
  }

  function buildReferralLink() {
    const addrOrCode = getCurrentWalletAddress() || 'YOUR_REF_CODE';
    const link = SITE_URL + '/?ref=' + encodeURIComponent(addrOrCode);
    document.getElementById('refLink').textContent = link;
    return link;
  }

  async function shareReferral() {
    const link = buildReferralLink();
    try {
      if (navigator.share) await navigator.share({ title: 'MintSim Referral', text: 'Join MintSim', url: link });
      else { await navigator.clipboard.writeText(link); alert('Ссылка скопирована'); }
    } catch {
      await navigator.clipboard.writeText(link); alert('Ссылка скопирована');
    }
  }

  async function copyReferral() {
    const link = buildReferralLink();
    await navigator.clipboard.writeText(link);
    alert('Ссылка скопирована');
  }

  function shortAddr(a){ return a && a.length > 12 ? (a.slice(0,6) + '…' + a.slice(-4)) : (a || ''); }

  function updateWalletUI(address, balanceStr) {
    const chip = document.getElementById('walletChip');
    const notc = document.getElementById('walletNotConnected');
    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');
    const short = document.getElementById('walletShort');
    const bal = document.getElementById('walletBalance');

    if (address) {
      window.__WALLET_ADDR__ = address;
      short.textContent = shortAddr(address);
      bal.textContent = balanceStr ? ('· ' + balanceStr) : '';
      chip.style.display = 'inline-flex';
      notc.style.display = 'none';
      connectBtn.style.display = 'inline-flex';
      connectBtn.style.visibility = 'hidden';
      disconnectBtn.style.display = 'inline-flex';
    } else {
      window.__WALLET_ADDR__ = '';
      chip.style.display = 'none';
      notc.style.display = 'inline';
      connectBtn.style.display = 'inline-flex';
      connectBtn.style.visibility = 'visible';
      disconnectBtn.style.display = 'none';
    }
    if (!document.getElementById('page-referral').classList.contains('hidden')) buildReferralLink();
  }

  // Партиклы (фон)
  (function particles() {
    const cvs = document.getElementById('particles');
    const ctx = cvs.getContext('2d');
    let W, H, dots = [];

    function resize() {
      W = cvs.width = window.innerWidth;
      H = cvs.height = window.innerHeight;
      dots = createDots();
    }
    function createDots() {
      const n = Math.min(80, Math.floor(W * H / 18000));
      const arr = [];
      for (let i=0;i<n;i++) {
        arr.push({
          x: Math.random()*W,
          y: Math.random()*H,
          r: Math.random()*1.6 + 0.6,
          vx: (Math.random()*0.6 - 0.3),
          vy: (Math.random()*0.6 - 0.3),
          a: Math.random()*0.6 + 0.2
        });
      }
      return arr;
    }
    function step() {
      ctx.clearRect(0,0,W,H);
      ctx.fillStyle = 'rgba(160,160,255,0.25)';
      for (const d of dots) {
        d.x += d.vx; d.y += d.vy;
        if (d.x < 0 || d.x > W) d.vx *= -1;
        if (d.y < 0 || d.y > H) d.vy *= -1;
        ctx.globalAlpha = d.a;
        ctx.beginPath();
        ctx.arc(d.x, d.y, d.r, 0, Math.PI*2);
        ctx.fill();
      }
      requestAnimationFrame(step);
    }
    window.addEventListener('resize', resize);
    resize();
    step();
  })();
</script>
</body>
</html>
