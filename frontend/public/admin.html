<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Panel</title>
    <style>
        body { font-family: monospace; background: #111; color: #0f0; padding: 20px; }
        input, button { background: #222; border: 1px solid #0f0; color: #0f0; padding: 10px; margin: 5px 0; width: 300px; display: block; }
        button { cursor: pointer; font-weight: bold; }
        button:hover { background: #0f0; color: #111; }
        .box { border: 1px dashed #0f0; padding: 15px; margin-bottom: 20px; width: 320px; }
    </style>
</head>
<body>

    <h2>MintSim</h2>
    
    <div class="box">
        <label>secret key:</label>
        <input type="password" id="secretKey" placeholder="ADMIN_SECRET">
    </div>

    <div class="box">
        <h3>📊 stats</h3>
        <button onclick="loadStats()">refresh stats</button>
        <pre id="statsOutput">waiting...</pre>
    </div>

    <div class="box">
        <h3>number</h3>
        <input type="text" id="targetWallet" placeholder="TON wallet">
        <input type="text" id="targetNumber" placeholder="number">
        <button onclick="customMint()">mint</button>
        <pre id="mintOutput"></pre>
    </div>

   <script>
        const baseUrl = 'https://api.mintsim.uk/api/admin'; 
        
        async function loadStats() {
            const secret = document.getElementById('secretKey').value;
            const res = await fetch(`${baseUrl}/stats`, {
                headers: { 'x-admin-secret': secret }
            });
            const data = await res.json();
            document.getElementById('statsOutput').innerText = JSON.stringify(data, null, 2);
        }

        async function customMint() {
            const secret = document.getElementById('secretKey').value;
            const wallet = document.getElementById('targetWallet').value;
            const number = document.getElementById('targetNumber').value;
            
            const outputEl = document.getElementById('mintOutput');
            outputEl.innerText = 'sending... (waiting mint)';
            
            try {
                const res = await fetch(`${baseUrl}/custom-mint`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-admin-secret': secret 
                    },
                    body: JSON.stringify({ walletAddress: wallet, number: number })
                });
                
                const data = await res.json();
                outputEl.innerText = JSON.stringify(data, null, 2);
            } catch (err) {
                outputEl.innerText = 'error request: ' + err.message;
            }
        }
    </script>
</body>
</html>
